<div class="change-password-container">
  <div class="change-password-card">
    <div class="card-header">
      <div class="lock-icon-wrapper">
        <svg class="lock-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <h2>Change Password Required</h2>
      <p class="subtitle">For security reasons, you must change your temporary password before you can access the university portal.</p>
    </div>

    <!-- Feedback messages -->
    @if (errorMessage) {
      <div class="alert-banner error">
        <svg class="alert-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span>{{ errorMessage }}</span>
      </div>
    }

    @if (successMessage) {
      <div class="alert-banner success">
        <svg class="alert-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        <span>{{ successMessage }}</span>
      </div>
    }

    <form (ngSubmit)="onSubmit()" class="change-password-form">
      <div class="form-group">
        <label for="oldPassword">Current Password</label>
        <input
          type="password"
          id="oldPassword"
          [(ngModel)]="oldPassword"
          name="oldPassword"
          required
          placeholder="Enter current password"
          class="form-control"
        />
      </div>

      <div class="form-group">
        <label for="newPassword">New Password</label>
        <input
          type="password"
          id="newPassword"
          [(ngModel)]="newPassword"
          name="newPassword"
          required
          placeholder="Min 6 characters"
          class="form-control"
        />
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm New Password</label>
        <input
          type="password"
          id="confirmPassword"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          required
          placeholder="Confirm new password"
          class="form-control"
        />
      </div>

      <div class="form-actions">
        <button type="submit" class="submit-btn">
          Update Password
        </button>
        <button type="button" (click)="logout()" class="cancel-btn">
          Log Out
        </button>
      </div>
    </form>
  </div>
</div>
