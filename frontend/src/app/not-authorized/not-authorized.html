<div class="auth-error-container">
  <div class="auth-error-card">
    <div class="error-icon-wrapper">
      <svg class="error-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    
    <h1>Access Denied</h1>
    <p>You do not have permission to view this page. Please return to your dashboard or contact system administrators if you believe this is an error.</p>
    
    <button (click)="goToDashboard()" class="home-btn">
      Return to Dashboard
    </button>
  </div>
</div>
