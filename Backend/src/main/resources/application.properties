spring.application.name=project
# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/edutech
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# MySQL Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

file.upload-dir=uploads

jwt.secret=YourVeryLongSecretKeyForJWTGeneration12345678901234567890
jwt.expiration=86400000


app.admin.username=hello
app.admin.password=123456
app.admin.email=hello@gmail.com
